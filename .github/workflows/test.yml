name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  statuses: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

      - name: Verify dist/ is up to date
        run: |
          if [ -n "$(git diff --name-only dist/)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the changes."
            git diff --stat dist/
            exit 1
          fi

  self-test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - uses: ./
        with:
          action: actions/github-script@v7
          with: '{"script": "core.info(\"commit-status self-test: wrapped action executed successfully\")"}'
          sha: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          context: 'commit-status Self-Test'
